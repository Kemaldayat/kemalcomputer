<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Kemal Computer</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0d9488;
            --primary-hover: #0f766e;
            --secondary-color: #f8fafc;
            --secondary-hover: #f1f5f9;
            --success-color: #10b981;
            --info-color: #3b82f6;
            --info-hover: #2563eb;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
            --danger-hover: #dc2626;
            --bg-color: #f1f5f9;
            --container-bg: #ffffff;
            --text-color: #334155;
            --text-color-light: #64748b;
            --border-color: #e2e8f0;
            --border-radius-sm: 8px;
            --border-radius-md: 12px;
            --border-radius-lg: 16px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --transition-ease: all 0.2s ease-in-out;
            
            /* Status Colors */
            --status-waiting-bg: #fef3c7;
            --status-waiting-text: #d97706;
            --status-process-bg: #dcfce7;
            --status-process-text: #15803d;
            --status-finished-bg: #ccfbf1;
            --status-finished-text: #0f766e;
            --status-picked-up-bg: #f3e8ff;
            --status-picked-up-text: #7e22ce;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 1400px;
            background-color: var(--container-bg);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-md);
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            color: var(--text-color);
            font-size: 1.8em;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1 i {
            color: var(--primary-color);
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 500;
            transition: var(--transition-ease);
            border: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary { background-color: var(--primary-color); color: white; }
        .btn-primary:hover { background-color: var(--primary-hover); }

        .btn-danger { background-color: #fee2e2; color: var(--danger-hover); }
        .btn-danger:hover { background-color: #fca5a5; color: white; }

        /* Search Bar & Tabs Setup */
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .top-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .status-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 2px;
            flex-grow: 1;
        }

        .tab-btn {
            padding: 8px 16px;
            border: none;
            background: none;
            font-size: 0.95em;
            font-weight: 500;
            color: var(--text-color-light);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: var(--transition-ease);
            white-space: nowrap;
        }

        .tab-btn:hover { color: var(--primary-color); }
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 350px;
        }

        .search-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-color-light);
        }

        #searchInput {
            width: 100%;
            padding: 10px 15px 10px 40px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-size: 0.95em;
            background-color: var(--secondary-color);
            transition: var(--transition-ease);
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        #searchInput:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15);
        }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
            border-radius: var(--border-radius-sm);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
        }

        #serviceTable {
            width: 100%;
            border-collapse: collapse;
            background-color: #fff;
            text-align: left;
        }

        #serviceTable th, #serviceTable td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        #serviceTable th {
            background-color: var(--secondary-color);
            color: var(--text-color-light);
            font-weight: 600;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #serviceTable tr:last-child td { border-bottom: none; }
        #serviceTable tbody tr:hover { background-color: var(--secondary-hover); }

        .status-column {
            position: sticky;
            right: 120px;
            z-index: 5;
            background-color: inherit;
        }
        
        .action-column {
            position: sticky;
            right: 0;
            z-index: 10;
            background-color: inherit;
            box-shadow: -4px 0 10px rgba(0,0,0,0.03);
        }
        
        #serviceTable th.status-column, 
        #serviceTable th.action-column {
            background-color: var(--secondary-color);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8em;
            letter-spacing: 0.3px;
        }
        .status-waiting { background-color: var(--status-waiting-bg); color: var(--status-waiting-text); }
        .status-process { background-color: var(--status-process-bg); color: var(--status-process-text); }
        .status-finished { background-color: var(--status-finished-bg); color: var(--status-finished-text); }
        .status-picked-up { background-color: var(--status-picked-up-bg); color: var(--status-picked-up-text); }

        /* Icon Buttons */
        .action-buttons { display: flex; gap: 8px; }
        .icon-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: var(--transition-ease);
            color: white;
        }

        .whatsapp-button { background-color: #25D366; }
        .whatsapp-button:hover { background-color: #16a34a; transform: translateY(-2px); box-shadow: var(--shadow-sm);}
        .edit-button { background-color: var(--info-color); }
        .edit-button:hover { background-color: var(--info-hover); transform: translateY(-2px); }
        .delete-button { background-color: var(--danger-color); }
        .delete-button:hover { background-color: var(--danger-hover); transform: translateY(-2px); }

        .add-new-button {
            margin-top: 25px;
            width: 100%;
            justify-content: center;
            font-size: 1.05em;
            padding: 14px;
        }

        .biaya-text {
            font-family: monospace;
            font-size: 1.05em;
            font-weight: 500;
            color: var(--primary-color);
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.6);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: var(--border-radius-md);
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: var(--shadow-lg);
            border: none;
            max-height: 90vh;
            overflow-y: auto;
        }

        #editModal .modal-content { max-width: 550px; }

        .close-button {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            color: var(--text-color-light);
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-button:hover { color: var(--danger-color); }

        #editModal h2 {
            margin-top: 0;
            color: var(--text-color);
            font-size: 1.5em;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-color);
            font-size: 0.9em;
        }
        
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-sm);
            font-family: inherit;
            transition: var(--transition-ease);
            background-color: var(--secondary-color);
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 25px;
            position: sticky;
            bottom: -30px;
            background: var(--container-bg);
            padding: 10px 0;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 992px) {
            header { flex-direction: column; align-items: flex-start; gap: 15px; }
            .header-buttons { width: 100%; justify-content: flex-start; }
            .status-column { right: 90px; }
            .top-controls { flex-direction: column; align-items: stretch; }
            .search-wrapper { max-width: 100%; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-laptop-medical"></i> Admin Area</h1>
            <div class="header-buttons">
                <button class="btn btn-primary" onclick="refreshData()"><i class="fas fa-sync-alt"></i> Segarkan</button>
                <button class="btn btn-danger" onclick="logoutAdmin()"><i class="fas fa-sign-out-alt"></i> Keluar</button>
            </div>
        </header>

        <section class="controls">
            <div class="top-controls">
                <div class="status-tabs" id="statusTabs">
                    <button class="tab-btn active" onclick="filterByTab('Semua', this)">Semua Antrian</button>
                    <button class="tab-btn" onclick="filterByTab('Menunggu', this)">Menunggu</button>
                    <button class="tab-btn" onclick="filterByTab('Proses', this)">Diproses</button>
                    <button class="tab-btn" onclick="filterByTab('Selesai', this)">Selesai</button>
                    <button class="tab-btn" onclick="filterByTab('Diambil', this)">Diambil</button>
                </div>

                <div class="search-wrapper">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari Kode, Nama, Device..." onkeyup="filterTable()">
                </div>
            </div>
        </section>

        <div class="table-responsive">
            <table id="serviceTable">
                <thead>
                    <tr>
                        <th>Kode Invoice</th>
                        <th>Nama Pelanggan</th>
                        <th>Device</th>
                        <th>Kerusakan</th>
                        <th>Nomor HP</th>
                        <th>Biaya</th>
                        <th class="status-column">Status</th>
                        <th>Keterangan</th>
                        <th class="action-column">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>

        <button class="btn btn-primary add-new-button" onclick="window.location.href='admin.html'">
            <i class="fas fa-plus-circle"></i> Tambah Antrian Servis Baru
        </button>
    </div>

    <div id="customModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <p id="modalMessage" style="font-weight: 500; font-size: 1.1em; margin-bottom: 20px; color: var(--text-color);"></p>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <div id="editModal" class="modal">
        <div class="modal-content">
            <span class="close-button" onclick="closeEditModal()">&times;</span>
            <h2>Edit Layanan</h2>
            <form id="editForm">
                <div class="form-group">
                    <label for="editKodeService">Kode Service</label>
                    <input type="text" id="editKodeService" readonly style="background-color: #e2e8f0; cursor: not-allowed;">
                </div>
                <div class="form-group">
                    <label for="editNama">Nama Pelanggan</label>
                    <input type="text" id="editNama" required>
                </div>
                <div class="form-group">
                    <label for="editDevice">Device</label>
                    <input type="text" id="editDevice" required>
                </div>
                <div class="form-group">
                    <label for="editKerusakan">Kerusakan</label>
                    <textarea id="editKerusakan" rows="2" required></textarea>
                </div>
                <div class="form-group">
                    <label for="editNomorHp">Nomor HP</label>
                    <input type="tel" id="editNomorHp" required>
                </div>
                <div class="form-group">
                    <label for="editBiaya">Biaya (Rp)</label>
                    <input type="number" id="editBiaya" placeholder="Contoh: 150000" min="0">
                </div>
                <div class="form-group">
                    <label for="editStatus">Status</label>
                    <select id="editStatus" required>
                        <option value="Menunggu">Menunggu</option>
                        <option value="Proses">Proses</option>
                        <option value="Selesai">Selesai</option>
                        <option value="Diambil">Diambil</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="editKeterangan">Keterangan</label>
                    <textarea id="editKeterangan" rows="2"></textarea>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn btn-primary" onclick="saveEdit()"><i class="fas fa-save"></i> Simpan</button>
                    <button type="button" class="btn" style="background-color: var(--border-color); color: var(--text-color);" onclick="closeEditModal()">Batal</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyDRvkYXHUb42q2H8F_2687CTihtDDNuYQ4",
            authDomain: "website-track-service.firebaseapp.com",
            databaseURL: "https://website-track-service-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "website-track-service",
            storageBucket: "website-track-service.firebasestorage.app",
            messagingSenderId: "87573564376",
            appId: "1:87573564376:web:c93c07f0506d00535a00ad",
            measurementId: "G-64T8XNWK5F"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        const adminEmail = "dayatkemal16@gmail.com";

        let servicesData = {};
        let currentTabFilter = 'Semua';

        onAuthStateChanged(auth, (user) => {
            if (user && user.email === adminEmail) {
                loadServices();
            } else {
                window.location.href = 'login.html';
            }
        });

        window.logoutAdmin = async () => {
            try {
                await signOut(auth);
                window.location.href = 'login.html';
            } catch (error) {
                showModal("Gagal logout.", "info");
            }
        };

        // Fungsi format Rupiah
        const formatRupiah = (angka) => {
            if (!angka || angka == 0) return "<span style='color:var(--text-color-light); font-size:0.9em;'>Belum ditentukan</span>";
            return new Intl.NumberFormat("id-ID", {
                style: "currency",
                currency: "IDR",
                minimumFractionDigits: 0
            }).format(angka);
        };

        window.loadServices = () => {
            const servicesRef = ref(db, 'antrian');
            onValue(servicesRef, (snapshot) => {
                const tableBody = document.getElementById('serviceTable').getElementsByTagName('tbody')[0];
                tableBody.innerHTML = '';
                servicesData = {};

                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const serviceCode = childSnapshot.key;
                        const service = childSnapshot.val();
                        servicesData[serviceCode] = service;

                        let statusBadgeClass = '';
                        switch (service.status) {
                            case 'Menunggu': statusBadgeClass = 'status-waiting'; break;
                            case 'Proses': statusBadgeClass = 'status-process'; break;
                            case 'Selesai': statusBadgeClass = 'status-finished'; break;
                            case 'Diambil': statusBadgeClass = 'status-picked-up'; break;
                        }

                        const row = tableBody.insertRow();
                        row.setAttribute('data-id', serviceCode);
                        row.setAttribute('data-status', service.status); // Simpan status untuk fitur Tab Filter
                        
                        row.innerHTML = `
                            <td><strong style="color:var(--primary-color)">${serviceCode}</strong></td>
                            <td data-field="nama">${service.nama}</td>
                            <td data-field="device">${service.device || '-'}</td>
                            <td data-field="kerusakan">${service.kerusakan}</td>
                            <td data-field="nomorHp">${service.nomorHp || '-'}</td>
                            <td data-field="biaya" class="biaya-text">${formatRupiah(service.biaya)}</td>
                            <td class="status-column" data-field="status"><span class="status-badge ${statusBadgeClass}">${service.status}</span></td>
                            <td data-field="keterangan">${service.keterangan || '-'}</td>
                            <td class="action-buttons action-column">
                                <button class="icon-btn whatsapp-button" title="Kirim Notifikasi WA" onclick="sendWhatsappNotification('${serviceCode}')"><i class="fab fa-whatsapp"></i></button>
                                <button class="icon-btn edit-button" title="Edit Data" onclick="openEditModal('${serviceCode}')"><i class="fas fa-edit"></i></button>
                                <button class="icon-btn delete-button" title="Hapus Data" onclick="deleteService('${serviceCode}')"><i class="fas fa-trash"></i></button>
                            </td>
                        `;
                    });
                } else {
                    renderNoDataRow(tableBody, 'Belum ada antrian servis.');
                }
                filterTable(); // Jalankan filter setiap kali data selesai diload
            });
        };

        // Logika Ganti Tab Status
        window.filterByTab = (status, element) => {
            currentTabFilter = status;
            
            // Ubah tampilan tombol tab yang aktif
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            filterTable();
        };

        // Kombinasi Search Bar & Tab Status
        window.filterTable = () => {
            const input = document.getElementById('searchInput');
            const searchText = input.value.toLowerCase();
            const tableBody = document.getElementById('serviceTable').getElementsByTagName('tbody')[0];
            const rows = tableBody.getElementsByTagName('tr');

            let found = false;
            let hasActualData = false;

            // Bersihkan baris "No data" sebelumnya
            const existingNoDataRow = tableBody.querySelector('.no-data-row');
            if (existingNoDataRow) existingNoDataRow.remove();

            // Cek apakah tabel punya data asli
            for (let i = 0; i < rows.length; i++) {
                if (!rows[i].classList.contains('no-data-row')) {
                    hasActualData = true; break;
                }
            }

            for (let i = 0; i < rows.length; i++) {
                if (rows[i].classList.contains('no-data-row')) continue;

                const rowStatus = rows[i].getAttribute('data-status');
                const textContent = rows[i].textContent.toLowerCase();
                
                // Logika Filter: Harus sesuai Tab Status DAN sesuai teks pencarian
                const matchesTab = (currentTabFilter === 'Semua' || rowStatus === currentTabFilter);
                const matchesSearch = textContent.includes(searchText);

                if (matchesTab && matchesSearch) {
                    rows[i].style.display = "";
                    found = true;
                } else {
                    rows[i].style.display = "none";
                }
            }

            // Tampilkan pesan error jika data kosong
            if (!found && hasActualData) {
                renderNoDataRow(tableBody, 'Data tidak ditemukan di kategori ini.', true);
            } else if (!hasActualData) {
                renderNoDataRow(tableBody, 'Belum ada antrian servis.');
            }
        };

        const renderNoDataRow = (tableBody, message, isSearch = false) => {
            const row = tableBody.insertRow();
            row.className = 'no-data-row';
            const icon = isSearch ? '<i class="fas fa-search" style="margin-right: 8px;"></i>' : '<i class="fas fa-box-open fa-2x" style="margin-bottom:10px; display:block;"></i>';
            const color = isSearch ? 'var(--danger-color)' : 'var(--text-color-light)';
            row.innerHTML = `<td colspan="9" style="text-align:center; padding: 30px; color:${color};">${icon}${message}</td>`;
        };

        window.sendWhatsappNotification = (serviceCode) => {
            const service = servicesData[serviceCode];
            if (!service) return;

            let pesanStatus = '';
            if (service.status === 'Selesai' || service.status === 'Diambil') {
                pesanStatus = `Sudah selesai pengerjaan. Silakan ambil di toko kami.`;
            } else if (service.status === 'Proses') {
                pesanStatus = `Sedang dalam pengerjaan teknisi.`;
            } else {
                pesanStatus = `Sedang menunggu antrian pengecekan.`;
            }

            // Pesan Biaya ditambahkan
            let infoBiaya = service.biaya && service.biaya > 0 
                ? `Biaya: *Rp ${new Intl.NumberFormat('id-ID').format(service.biaya)}*` 
                : `Biaya: *Menunggu pengecekan/Belum ditentukan*`;

            const message = `
*Notifikasi | Kemal Computer | Service*
*==============================*
Kepada Yth. ${service.nama},
Servisan Anda *${service.device}* dengan nomor invoice *${serviceCode}* saat ini:
Status: *${pesanStatus}*
${infoBiaya}
*==============================*
Pantau progres selengkapnya melalui link berikut:
_https://kemalcomputer.vercel.app/?code=${serviceCode}_
Terimakasih 🙏🙏😊
            `.trim();

            const whatsappUrl = `https://wa.me/${service.nomorHp}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        };

        window.refreshData = () => loadServices();

        window.openEditModal = (serviceCode) => {
            const service = servicesData[serviceCode];
            if (!service) return;

            document.getElementById('editKodeService').value = serviceCode;
            document.getElementById('editNama').value = service.nama;
            document.getElementById('editDevice').value = service.device || '';
            document.getElementById('editKerusakan').value = service.kerusakan;
            document.getElementById('editNomorHp').value = service.nomorHp || '';
            document.getElementById('editBiaya').value = service.biaya || '';
            document.getElementById('editStatus').value = service.status;
            document.getElementById('editKeterangan').value = service.keterangan || '';
            
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeEditModal = () => document.getElementById('editModal').style.display = 'none';

        window.saveEdit = async () => {
            const serviceCode = document.getElementById('editKodeService').value;
            const updatedNama = document.getElementById('editNama').value.trim();
            const updatedDevice = document.getElementById('editDevice').value.trim();
            const updatedKerusakan = document.getElementById('editKerusakan').value.trim();
            const updatedNomorHp = document.getElementById('editNomorHp').value.trim();
            const updatedBiaya = document.getElementById('editBiaya').value.trim();
            const updatedStatus = document.getElementById('editStatus').value;
            const updatedKeterangan = document.getElementById('editKeterangan').value.trim();

            if (!updatedNama || !updatedDevice || !updatedKerusakan || !updatedNomorHp || !updatedStatus) {
                showModal('Pastikan form yang wajib disi tidak kosong!', 'info');
                return;
            }

            try {
                const originalTimestamp = servicesData[serviceCode]?.timestamp || new Date().toISOString();

                await set(ref(db, `antrian/${serviceCode}`), {
                    nama: updatedNama,
                    device: updatedDevice,
                    kerusakan: updatedKerusakan,
                    nomorHp: updatedNomorHp,
                    biaya: Number(updatedBiaya) || 0, // Simpan biaya sebagai angka
                    status: updatedStatus,
                    keterangan: updatedKeterangan,
                    timestamp: originalTimestamp
                });
                showModal("Data sukses diperbarui!", "info");
                closeEditModal();
                loadServices();
            } catch (error) {
                showModal("Gagal update data. Cek koneksi internet.", "info");
            }
        };

        window.deleteService = (serviceCode) => {
            showModal(`Yakin mau menghapus data servis ${serviceCode}?`, "confirm", () => confirmDelete(serviceCode));
        };

        const confirmDelete = async (serviceCode) => {
            closeModal();
            try {
                await remove(ref(db, `antrian/${serviceCode}`));
                showModal("Data berhasil dihapus!", "info");
            } catch (error) {
                showModal("Gagal menghapus data.", "info");
            }
        };

        // Modal Logic Helper
        const customModal = document.getElementById('customModal');
        const modalMessage = document.getElementById('modalMessage');
        const modalButtons = document.getElementById('modalButtons');

        window.showModal = (message, type, callback) => {
            modalMessage.textContent = message;
            modalButtons.innerHTML = '';

            if (type === "info") {
                const okBtn = document.createElement('button');
                okBtn.innerHTML = '<i class="fas fa-check"></i> OK';
                okBtn.className = 'btn btn-primary';
                okBtn.onclick = () => { closeModal(); if (callback) callback(); };
                modalButtons.appendChild(okBtn);
            } else if (type === "confirm") {
                const yesBtn = document.createElement('button');
                yesBtn.innerHTML = '<i class="fas fa-check"></i> Ya, Hapus';
                yesBtn.className = 'btn btn-danger';
                yesBtn.onclick = () => { if (callback) callback(); closeModal(); };
                
                const noBtn = document.createElement('button');
                noBtn.textContent = 'Batal';
                noBtn.className = 'btn';
                noBtn.style.backgroundColor = 'var(--border-color)';
                noBtn.onclick = closeModal;
                
                modalButtons.appendChild(yesBtn);
                modalButtons.appendChild(noBtn);
            }
            customModal.style.display = 'flex';
        };

        window.closeModal = () => customModal.style.display = 'none';

        window.onclick = (e) => {
            if (e.target == customModal || e.target == document.getElementById('editModal')) {
                closeModal(); closeEditModal();
            }
        };
    </script>
</body>
</html>
