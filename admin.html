<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Layanan Baru - Kemal Computer</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-plus-circle"></i> Tambah Servis</h1>
            <button class="back-button" onclick="window.location.href='dashboard.html'"><i class="fas fa-arrow-left"></i> Kembali</button>
        </header>

        <form id="addServiceForm">
            <div>
                <label for="inputNama">Nama Pelanggan:</label>
                <input type="text" id="inputNama" list="listPelangganLama" placeholder="Ketik nama pelanggan..." required>
                <datalist id="listPelangganLama">
                    </datalist>
            </div>

            <div>
                <label for="inputNomorHp">Nomor HP (Awali dengan 62):</label>
                <input type="tel" id="inputNomorHp" placeholder="Contoh: 6281234567890" required>
                <span id="badgeAutofill" class="autofill-badge"><i class="fas fa-check-circle"></i> Auto-fill dari Profil</span>
            </div>

            <div>
                <label for="inputDevice">Jenis Device (Laptop, HP, dll):</label>
                <input type="text" id="inputDevice" placeholder="Contoh: Asus VivoBook 14" required>
            </div>

            <div>
                <label for="inputKerusakan">Deskripsi Kerusakan:</label>
                <textarea id="inputKerusakan" rows="3" placeholder="Contoh: Mati total kena air" required></textarea>
            </div>
            
            <div>
                <label for="inputBiaya">Estimasi Biaya / Total Tagihan (Rp):</label>
                <input type="number" id="inputBiaya" placeholder="Contoh: 150000" min="0">
            </div>

            <div>
                <label for="inputModalKomponen">Modal Komponen / Sparepart (Rp):</label>
                <input type="number" id="inputModalKomponen" placeholder="Opsional (misal: 50000)" min="0">
            </div>

            <div>
                <label for="inputStatus">Status Pengerjaan:</label>
                <select id="inputStatus" required>
                    <option value="Menunggu">Menunggu</option>
                    <option value="Proses">Proses</option>
                    <option value="Selesai">Selesai</option>
                    <option value="Diambil">Diambil</option>
                </select>
            </div>
            
            <div>
                <label for="inputKeterangan">Catatan Tambahan (Opsional):</label>
                <textarea id="inputKeterangan" rows="2" placeholder="Catatan khusus untuk teknisi atau pelanggan"></textarea>
            </div>

            <button type="submit" id="btnSubmit"><i class="fas fa-save"></i> Simpan Data Servis</button>
        </form>
    </div>

    <script src="js/ui-utils.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
