<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Kemal Computer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <h1>Login Admin</h1>
        <form id="loginForm" class="login-form">
            <div>
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn-login-email"><i class="fas fa-sign-in-alt"></i> Login</button>
            <div class="divider"><span>ATAU</span></div>
            <button type="button" id="btnGoogleLogin" class="btn-login-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo" class="google-icon">
                Masuk dengan Google
            </button>
        </form>
    </div>

    <!-- Script UI Utilities (SweetAlert) -->
    <script src="js/ui-utils.js"></script>

    <div id="customToast" class="success-toast">
        <i class="fas fa-check-circle"></i> 
        <span id="toastMessage"></span>
    </div>

    <script type="module">
        import { auth, adminEmail, signInWithEmailAndPassword, signOut, GoogleAuthProvider, signInWithPopup, db, dbRef, set } from "./js/firebase-config.js";

        // Fungsi mencatat riwayat login ke Firebase
        async function catatRiwayatLogin(email, metode) {
            try {
                const logId = 'LOG-' + Date.now();
                await set(dbRef(db, 'riwayat_login/' + logId), {
                    email: email,
                    waktu: new Date().toISOString(),
                    metode: metode
                });
            } catch(e) { console.error("Gagal mencatat log", e); }
        }

        // EVENT LISTENER LOGIKA UTAMA (EMAIL & PASSWORD)
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!email || !password) return window.showSweetAlert("Email dan Password wajib diisi.", "error");

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                if (user.email === adminEmail) {
                    await catatRiwayatLogin(user.email, "Email/Password");
                    window.showSweetAlert('Login berhasil! Mengarahkan ke Dashboard...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    await signOut(auth); 
                    window.showSweetAlert("Email ini tidak memiliki izin akses admin.", "error");
                }
            } catch (error) {
                let errorMessage = "Login gagal. Periksa email dan password Anda.";
                if (error.code === 'auth/wrong-password') errorMessage = "Password salah.";
                else if (error.code === 'auth/user-not-found') errorMessage = "Email tidak terdaftar.";
                else if (error.code === 'auth/too-many-requests') errorMessage = "Terlalu banyak percobaan login gagal. Coba lagi nanti.";
                window.showSweetAlert(errorMessage, "error"); 
            }
        });

        // EVENT LISTENER LOGIN GOOGLE
        document.getElementById('btnGoogleLogin').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                if (user.email === adminEmail) {
                    await catatRiwayatLogin(user.email, "Google");
                    window.showSweetAlert('Login Google berhasil! Mengarahkan...', 'success');
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    await signOut(auth);
                    window.showSweetAlert("Akun Google ini tidak memiliki akses admin.", "error");
                }
            } catch (error) {
                console.error("Google Sign-In Error:", error.code, error.message);
                let msg = "Login Google gagal.";
                if (error.code === 'auth/popup-blocked') msg = "Popup diblokir oleh browser. Izinkan popup untuk halaman ini.";
                else if (error.code === 'auth/popup-closed-by-user') msg = "Jendela login Google ditutup. Silakan coba lagi.";
                else if (error.code === 'auth/unauthorized-domain') msg = "Domain ini belum diizinkan di Firebase. Tambahkan '127.0.0.1' ke Authorized Domains di Firebase Console.";
                else if (error.code === 'auth/cancelled-popup-request') return; // Diabaikan jika klik ganda
                else msg = `Login Google gagal (${error.code || 'unknown'}).`;
                window.showSweetAlert(msg, "error");
            }
        });
    </script>
</body>
</html>
